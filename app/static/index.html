<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>HomeDash</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="auth-view" class="auth-screen"></div>
  <div id="app-shell" class="hidden">
    <header>
      <h1>🏠 HomeDash</h1>
      <div class="header-actions">
        <button id="refresh-btn" title="刷新">🔄</button>
        <div class="account-menu-wrap">
          <button id="settings-btn" title="账户菜单" aria-expanded="false">•••</button>
          <div id="account-menu" class="account-menu hidden"></div>
        </div>
      </div>
    </header>
    <nav class="tabs">
      <button class="tab active" data-tab="ai">AI 工作台</button>
      <button class="tab" data-tab="items">日用品</button>
      <button class="tab" data-tab="todos">重点待办</button>
      <button class="tab" data-tab="travel">旅游计划</button>
    </nav>
    <main>
      <section id="tab-items" class="panel"></section>
      <section id="tab-todos" class="panel"></section>
      <section id="tab-ai" class="panel active"></section>
      <section id="tab-travel" class="panel"></section>
      <section id="tab-setup" class="panel"></section>
    </main>
  </div>
  <div id="toast"></div>
  <div id="modal" class="modal hidden"></div>
  <script src="/app.js"></script>
</body>
</html>
