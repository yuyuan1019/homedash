services:
  homedash:
    build: .
    ports:
      - "${HOMEDASH_PORT:-8088}:8000"
    env_file:
      - .env
    environment:
      KUMA_DB_PATH: /kuma-data/kuma.db
      DEVICES_PATH: /app/config/devices.yaml
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      # ponytail: mount a directory, not kuma.db itself; missing file stays harmless.
      - ${KUMA_DATA_DIR:-./data}:/kuma-data:ro
    restart: unless-stopped
