services:
  homedash:
    build: .
    ports:
      - "8088:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      # 只读挂载 Uptime Kuma 的 SQLite 文件
      # 改成你的 Kuma DB 路径，对应 .env 里的 KUMA_DB_PATH
      - /path/to/your/kuma.db:/data/kuma.db:ro
    network_mode: host   # python-miio 需要局域网访问；不用米家设备可去掉
    restart: unless-stopped
